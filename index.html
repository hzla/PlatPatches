<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pokemon Platinum ROM Patcher</title>
    <link rel="stylesheet" href="./styles.css?v=25" />
  </head>
  <body>
    <main class="shell">
      <section class="header">
        <div>
          <p class="eyebrow">US Pokemon Platinum</p>
          <h1>ROM Patcher</h1>
        </div>
        <div class="status-pill" id="romStatus">No ROM loaded · v25</div>
      </section>

      <section class="panel upload-panel">
        <label class="file-drop" for="romInput">
          <span class="file-title">Choose a .nds ROM</span>
          <span class="file-subtitle" id="fileSubtitle">The patched ROM is generated locally in your browser.</span>
        </label>
        <input id="romInput" type="file" accept=".nds,application/octet-stream" />
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Patches</h2>
          <label class="force-toggle">
            <input id="forceInput" type="checkbox" />
            <span>Romhack Compatability Mode</span>
          </label>
        </div>

        <div class="patch-grid" id="patchGrid">
          <div class="patch-card patch-card-config">
            <input id="fairyTypePatch" type="checkbox" value="fairyType" />
            <div class="patch-body">
              <label class="patch-title" for="fairyTypePatch">
                <strong>Fairy Patch</strong>
                <small>Replaces the ??? slot with Fairy battle logic and visual assets.</small>
              </label>
              <label class="nested-toggle" for="fairyPokemonTypesPatch">
                <input id="fairyPokemonTypesPatch" type="checkbox" value="fairyPokemonTypes" />
                <span>Update Pokemon Types</span>
              </label>
            </div>
          </div>

          <div class="patch-card patch-card-config">
            <input id="frameRatePatch" type="checkbox" value="frameRate" />
            <div class="patch-body">
              <label class="patch-title" for="frameRatePatch">
                <strong>Unlock framerate</strong>
                <small>Skips the extra VBlank wait used by slower game contexts. Experimental.</small>
              </label>
              <div class="radio-row" role="radiogroup" aria-label="Framerate unlock mode">
                <label>
                  <input type="radio" name="frameRateMode" value="battle" checked />
                  <span>Battle only</span>
                </label>
                <label>
                  <input type="radio" name="frameRateMode" value="global" />
                  <span>Global</span>
                </label>
              </div>
            </div>
          </div>

          <div class="patch-card patch-card-config">
            <input id="shinyOddsPatch" type="checkbox" value="shinyOdds" />
            <div class="patch-body">
              <label class="patch-title" for="shinyOddsPatch">
                <strong>Shiny odds</strong>
                <small>Changes the global shiny odds from 0% to 100%.</small>
              </label>
              <div class="range-control">
                <label for="shinyOddsPercent">
                  <span>Odds</span>
                  <output id="shinyOddsValue" for="shinyOddsPercent">1% - 655/65536</output>
                </label>
                <input id="shinyOddsPercent" type="range" min="0" max="100" step="1" value="1" />
              </div>
            </div>
          </div>

          <div class="patch-card patch-card-config">
            <input id="critOddsPatch" type="checkbox" value="critOdds" />
            <div class="patch-body">
              <label class="patch-title" for="critOddsPatch">
                <strong>Critical hit odds</strong>
                <small>Changes the base critical-hit chance divisor.</small>
              </label>
              <div class="range-control">
                <label for="critBaseDivisor">
                  <span>Base divisor</span>
                  <output id="critOddsValue" for="critBaseDivisor">1/24 base</output>
                </label>
                <input id="critBaseDivisor" type="range" min="1" max="255" step="1" value="24" />
              </div>
            </div>
          </div>

          <label class="patch-card">
            <input type="checkbox" value="critDamage" />
            <span>
              <strong>Critical damage 1.5x</strong>
              <small>Normal crits deal 1.5x damage; Sniper crits scale to 2.25x.</small>
            </span>
          </label>

          <div class="patch-card patch-card-config">
            <input id="text4xPatch" type="checkbox" value="text4x" />
            <div class="patch-body">
              <label class="patch-title" for="text4xPatch">
                <strong>Experimental text speed</strong>
                <small>Prints multiple normal characters per frame. Experimental; may have text timing quirks.</small>
              </label>
              <div class="range-control">
                <label for="textCharsPerFrame">
                  <span>Chars per frame</span>
                  <output id="textCharsPerFrameValue" for="textCharsPerFrame">4x</output>
                </label>
                <input id="textCharsPerFrame" type="range" min="2" max="10" step="1" value="4" />
              </div>
            </div>
          </div>

          <label class="patch-card">
            <input type="checkbox" value="noCrits" />
            <span>
              <strong>No critical hits</strong>
              <small>Forces the critical-hit multiplier routine to return non-critical.</small>
            </span>
          </label>

          <div class="patch-card patch-card-config">
            <input id="ivRangePatch" type="checkbox" value="iv15_31" />
            <div class="patch-body">
              <label class="patch-title" for="ivRangePatch">
                <strong>Random IV range</strong>
                <small>Rerolls each random IV until it lands inside the selected range.</small>
              </label>
              <div class="range-control">
                <label for="ivMin">
                  <span>Minimum</span>
                  <output id="ivMinValue" for="ivMin">15</output>
                </label>
                <input id="ivMin" type="range" min="0" max="31" step="1" value="15" />
              </div>
              <div class="range-control">
                <label for="ivMax">
                  <span>Maximum</span>
                  <output id="ivMaxValue" for="ivMax">31</output>
                </label>
                <input id="ivMax" type="range" min="0" max="31" step="1" value="31" />
              </div>
            </div>
          </div>

          <div class="patch-card patch-card-config">
            <input id="wildNaturesPatch" type="checkbox" value="wildNatures" />
            <div class="patch-body">
              <label class="patch-title" for="wildNaturesPatch">
                <strong>Filter wild natures</strong>
                <small>Only selected natures can be randomly generated for wild Pokemon.</small>
              </label>
              <div class="nature-heading">
                <span>Allowed natures</span>
                <output id="natureCountValue">25 allowed</output>
              </div>
              <div class="nature-grid" id="natureGrid"></div>
            </div>
          </div>

          <label class="patch-card">
            <input type="checkbox" value="movementSpeed" />
            <span>
              <strong>Faster movement</strong>
              <small>Bumps walk/run/cycling movement actions up to faster tiers.</small>
            </span>
          </label>

          <label class="patch-card">
            <input type="checkbox" value="playerAccuracy" />
            <span>
              <strong>Player accuracy bypass</strong>
              <small>Player-side moves bypass standard accuracy misses.</small>
            </span>
          </label>
        </div>
      </section>

      <section class="actions">
        <label class="output-name">
          <span>Output file name</span>
          <input id="outputNameInput" type="text" placeholder="Auto-generated .nds name" />
        </label>
        <button id="applyButton" type="button" disabled>Apply selected patches</button>
        <a id="downloadLink" class="download-link hidden">Download patched ROM</a>
      </section>

      <section class="panel log-panel">
        <h2>Log</h2>
        <pre id="logOutput">Waiting for a ROM.</pre>
      </section>

      <footer class="credits">
        <h2>Credits</h2>
        <p>
          Fairy insertion code: Mikelan98, BagBoy:
          <cite>Fairy Type in Pokemon Platinum</cite>
          (<a href="https://pokehacking.com/r/20071800" rel="noreferrer">pokehacking.com/r/20071800</a>)
        </p>
      </footer>

      <dialog class="info-modal" id="patchInfoModal">
        <div class="modal-heading">
          <h2 id="patchInfoTitle">Patch info</h2>
          <button class="modal-close" id="patchInfoClose" type="button" aria-label="Close patch info">×</button>
        </div>
        <p id="patchInfoSummary"></p>
        <h3>Technical details</h3>
        <ul id="patchInfoRegions"></ul>
      </dialog>
    </main>

    <script src="./app.js?v=25"></script>
  </body>
</html>
